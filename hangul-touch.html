<!DOCTYPE html>
<html lang="ko" style="background-color:#FFF8E7 !important;color:#5B4A3F !important;">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="color-scheme" content="light only">
  <title>ㄱㄴㄷ 터치놀이</title>
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Gaegu:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light only !important;
    }

    @media (prefers-color-scheme: dark) {

      html,
      body,
      div,
      button,
      h1,
      p,
      span,
      canvas {
        color-scheme: light only !important;
      }
    }

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      width: 100%;
      height: 100%;
      background-color: #FFF8E7 !important;
    }

    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      font-family: 'Jua', sans-serif;
      background-color: #FFF8E7 !important;
      color: #5B4A3F !important;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -1;
      background-color: #FFF8E7 !important;
      background-image:
        radial-gradient(circle at 20% 80%, rgba(255, 200, 100, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(150, 220, 255, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(255, 180, 200, 0.15) 0%, transparent 60%);
    }

    .screen {
      display: none;
      width: 100%;
      height: 100%;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .screen.active {
      display: flex;
    }

    .header {
      text-align: center;
      margin-bottom: 12px;
      animation: dropIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .header h1 {
      font-size: clamp(24px, 5vw, 36px);
      color: #5B4A3F !important;
      letter-spacing: 2px;
      text-shadow: 2px 2px 0 rgba(255, 255, 255, 0.8);
    }

    .header p {
      font-family: 'Gaegu', cursive;
      font-size: clamp(14px, 3vw, 20px);
      color: #9B8B7E !important;
      margin-top: 2px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: clamp(8px, 2vw, 14px);
      padding: clamp(8px, 2vw, 16px);
      max-width: 520px;
      width: 95%;
    }

    .letter-btn {
      aspect-ratio: 1;
      border: none;
      border-radius: 20px;
      font-family: 'Jua', sans-serif;
      font-size: clamp(28px, 7vw, 48px);
      color: #ffffff !important;
      cursor: pointer;
      position: relative;
      transition: transform 0.1s, box-shadow 0.1s;
      box-shadow: 0 6px 0 rgba(0, 0, 0, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      animation: dropIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .letter-btn:active {
      transform: scale(0.92) translateY(3px);
      box-shadow: 0 2px 0 rgba(0, 0, 0, 0.1);
    }

    .letter-btn .sparkle {
      position: absolute;
      pointer-events: none;
      font-size: clamp(16px, 4vw, 28px);
      animation: sparkleUp 0.7s ease-out forwards;
      z-index: 10;
    }

    .result-overlay {
      position: fixed;
      inset: 0;
      background-color: rgba(0, 0, 0, 0.25) !important;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .result-overlay.active {
      display: flex;
    }

    .result-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.07);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: #888;
      cursor: pointer;
      user-select: none;
      z-index: 10;
      transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      line-height: 1;
    }

    .result-nav-left {
      left: 8px;
    }

    .result-nav-right {
      right: 8px;
    }

    .result-nav:active {
      background: rgba(0, 0, 0, 0.15);
      transform: translateY(-50%) scale(0.88);
    }

    .result-card {
      background-color: #ffffff !important;
      color: #5B4A3F !important;
      border-radius: 32px;
      padding: clamp(24px, 5vw, 40px);
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      max-width: 85vw;
      width: 340px;
      position: relative;
      overflow: hidden;
    }

    .result-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: linear-gradient(90deg, #FF6B6B, #FFE66D, #4ECDC4, #A8E6CF, #FF8A5C) !important;
    }

    .result-emoji {
      font-size: clamp(56px, 14vw, 88px);
      line-height: 1;
      margin-bottom: 6px;
      animation: bounce 0.6s ease-in-out infinite alternate;
      animation-delay: 0.3s;
    }

    .result-letter {
      font-size: clamp(44px, 11vw, 64px);
      font-weight: bold;
      margin-bottom: 2px;
    }

    .result-word {
      font-family: 'Gaegu', cursive;
      font-size: clamp(22px, 5.5vw, 32px);
      color: #5B4A3F !important;
      font-weight: 700;
    }

    .result-sub {
      font-family: 'Gaegu', cursive;
      font-size: clamp(13px, 3.2vw, 18px);
      color: #B0A090 !important;
      margin-top: 2px;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .action-btn {
      border: none;
      border-radius: 50px;
      padding: 11px 24px;
      font-family: 'Jua', sans-serif;
      font-size: clamp(14px, 3.5vw, 20px);
      cursor: pointer;
      transition: transform 0.1s;
      -webkit-appearance: none;
      appearance: none;
    }

    .action-btn:active {
      transform: translateY(3px);
    }

    .btn-again {
      background-color: #FFE66D !important;
      color: #5B4A3F !important;
      box-shadow: 0 4px 0 #E6CF50;
    }

    .btn-again:active {
      box-shadow: 0 1px 0 #E6CF50;
    }

    .btn-trace {
      background-color: #4ECDC4 !important;
      color: #ffffff !important;
      box-shadow: 0 4px 0 #3BA89F;
    }

    .btn-trace:active {
      box-shadow: 0 1px 0 #3BA89F;
    }

    #traceScreen {
      position: fixed;
      inset: 0;
      z-index: 200;
      background-color: #FFF8E7 !important;
      padding: 16px;
    }

    .trace-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 420px;
      margin-bottom: 10px;
    }

    .trace-title {
      font-size: clamp(18px, 4.5vw, 28px);
      color: #5B4A3F !important;
    }

    .trace-title span {
      font-size: clamp(22px, 5.5vw, 34px);
    }

    .trace-back-btn {
      border: none;
      border-radius: 50px;
      padding: 8px 20px;
      font-family: 'Jua', sans-serif;
      font-size: clamp(13px, 3.2vw, 18px);
      background-color: #FF8A5C !important;
      color: #fff !important;
      box-shadow: 0 3px 0 #D06A40;
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
    }

    .trace-back-btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #D06A40;
    }

    .canvas-wrap {
      position: relative;
      width: 100%;
      max-width: 420px;
      aspect-ratio: 1;
      border-radius: 24px;
      overflow: hidden;
      background-color: #ffffff !important;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
    }

    .canvas-wrap canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    #guideCanvas {
      z-index: 1;
    }

    #animCanvas {
      z-index: 2;
      display: none;
      opacity: 1;
      transition: opacity 0.5s;
    }

    #drawCanvas {
      z-index: 3;
    }

    .trace-btns {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    .trace-clear-btn {
      border: none;
      border-radius: 50px;
      padding: 10px 28px;
      font-family: 'Jua', sans-serif;
      font-size: clamp(14px, 3.5vw, 20px);
      background-color: #A78BFA !important;
      color: #fff !important;
      box-shadow: 0 4px 0 #8B6FD6;
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
    }

    .trace-clear-btn:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #8B6FD6;
    }

    .trace-next-btn {
      border: none;
      border-radius: 50px;
      padding: 10px 28px;
      font-family: 'Jua', sans-serif;
      font-size: clamp(14px, 3.5vw, 20px);
      background-color: #4ECDC4 !important;
      color: #fff !important;
      box-shadow: 0 4px 0 #3BA89F;
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
    }

    .trace-next-btn:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #3BA89F;
    }

    .praise-overlay {
      position: fixed;
      inset: 0;
      z-index: 300;
      display: none;
      align-items: center;
      justify-content: center;
      background-color: rgba(0, 0, 0, 0.2) !important;
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
    }

    .praise-overlay.active {
      display: flex;
    }

    .praise-card {
      background-color: #ffffff !important;
      border-radius: 32px;
      padding: clamp(32px, 7vw, 56px);
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .praise-emoji {
      font-size: clamp(60px, 15vw, 90px);
      animation: bounce 0.5s ease-in-out infinite alternate;
    }

    .praise-text {
      font-size: clamp(24px, 6vw, 40px);
      color: #5B4A3F !important;
      margin-top: 8px;
    }

    .praise-sub {
      font-family: 'Gaegu', cursive;
      font-size: clamp(16px, 4vw, 24px);
      color: #9B8B7E !important;
      margin-top: 4px;
    }

    .praise-tap {
      font-family: 'Jua', sans-serif;
      font-size: clamp(15px, 3.5vw, 20px);
      color: #FF8A5C !important;
      margin-top: 20px;
      animation: blink 1.5s infinite;
      cursor: pointer;
    }

    .deco {
      position: fixed;
      pointer-events: none;
      opacity: 0.15;
      font-size: clamp(30px, 8vw, 50px);
      z-index: 0;
    }

    .deco-1 {
      top: 5%;
      left: 5%;
      animation: floatA 6s ease-in-out infinite;
    }

    .deco-2 {
      top: 8%;
      right: 8%;
      animation: floatB 7s ease-in-out infinite;
    }

    .deco-3 {
      bottom: 6%;
      left: 10%;
      animation: floatA 8s ease-in-out infinite;
    }

    .deco-4 {
      bottom: 10%;
      right: 6%;
      animation: floatB 5s ease-in-out infinite;
    }

    @keyframes dropIn {
      from {
        opacity: 0;
        transform: translateY(-30px) scale(0.9)
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1)
      }
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.5)
      }

      to {
        opacity: 1;
        transform: scale(1)
      }
    }

    @keyframes bounce {
      from {
        transform: translateY(0)
      }

      to {
        transform: translateY(-10px)
      }
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }

    @keyframes sparkleUp {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(1)
      }

      100% {
        opacity: 0;
        transform: translate(var(--sx), var(--sy)) scale(0.3)
      }
    }

    @keyframes floatA {

      0%,
      100% {
        transform: translateY(0) rotate(0deg)
      }

      50% {
        transform: translateY(-15px) rotate(8deg)
      }
    }

    @keyframes floatB {

      0%,
      100% {
        transform: translateY(0) rotate(0deg)
      }

      50% {
        transform: translateY(10px) rotate(-6deg)
      }
    }

    @keyframes confettiFall {
      0% {
        transform: translateY(-10px) rotate(0deg);
        opacity: 1
      }

      100% {
        transform: translateY(100vh) rotate(720deg);
        opacity: 0
      }
    }

    .confetti {
      position: fixed;
      top: -20px;
      font-size: 24px;
      z-index: 350;
      pointer-events: none;
      animation: confettiFall 2.5s ease-in forwards;
    }

    /* === NAV: 홈 버튼 + 언어 토글 === */
    .gk-nav {
      position: fixed;
      top: 12px;
      left: 12px;
      display: flex;
      gap: 8px;
      z-index: 9999;
    }

    .gk-nav-btn {
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 2px solid rgba(0, 0, 0, 0.08);
      border-radius: 50px;
      padding: 8px 14px;
      font-family: 'Jua', sans-serif;
      font-size: clamp(13px, 3vw, 15px);
      color: #5B4A3F;
      cursor: pointer;
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.12);
      -webkit-tap-highlight-color: transparent;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .gk-nav-btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.12);
    }
  </style>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  <meta name="theme-color" content="#FFF8E7">
</head>

<body style="background-color:#FFF8E7 !important;color:#5B4A3F !important;">
  <div class="gk-nav">
    <a class="gk-nav-btn" href="index.html">🏠 <span data-ko="홈" data-en="Home">홈</span></a>
    <button class="gk-nav-btn" id="gkLangBtn" onclick="gkToggleLang()" style="display: none;">🇺🇸 EN</button>
  </div>

  <div class="deco deco-1">⭐</div>
  <div class="deco deco-2">🌈</div>
  <div class="deco deco-3">🎵</div>
  <div class="deco deco-4">💫</div>

  <div class="screen active" id="gridScreen">
    <div class="header">
      <h1 style="color:#5B4A3F;">ㄱㄴㄷ 터치놀이</h1>
      <p style="color:#9B8B7E;">글자를 누르면 소리가 나와요!</p>
    </div>
    <div class="grid" id="grid"></div>
  </div>

  <div class="result-overlay" id="overlay">
    <div class="result-card" id="resultCard" style="background-color:#ffffff;color:#5B4A3F;">
      <div class="result-nav result-nav-left" id="resNavLeft">&#8249;</div>
      <div class="result-emoji" id="resEmoji"></div>
      <div class="result-letter" id="resLetter"></div>
      <div class="result-word" id="resWord" style="color:#5B4A3F;"></div>
      <div class="result-sub" id="resSub" style="color:#B0A090;"></div>
      <div class="btn-row">
        <button class="action-btn btn-again" id="btnAgain" style="background-color:#FFE66D;color:#5B4A3F;"

        <button class="action-btn btn-trace" id="btnTrace" style="background-color:#4ECDC4;color:#fff;">따라쓰기 ✏️</button>
      </div>
      <div class="result-nav result-nav-right" id="resNavRight">&#8250;</div>
    </div>
  </div>

  <div class="screen" id="traceScreen" style="background-color:#FFF8E7 !important;">
    <div class="trace-header">
      <div class="trace-title" id="traceTitle" style="color:#5B4A3F;"></div>
      <button class="trace-back-btn" id="traceBackBtn" style="background-color:#FF8A5C;color:#fff;" data-ko="돌아가기"
        data-en="Back">돌아가기</button>

      <canvas id="guideCanvas"></canvas>
      <canvas id="animCanvas"></canvas>
      <canvas id="drawCanvas"></canvas>
    </div>
    <div class="trace-btns">
      <button class="trace-clear-btn" id="traceClearBtn" style="background-color:#A78BFA;color:#fff;">지우기 🧹</button>
      <button class="trace-replay-btn" id="traceReplayBtn" style="background-color:#FB923C;color:#fff;">획순 🎬</button>
      <button class="trace-next-btn" id="traceNextBtn" style="background-color:#4ECDC4;color:#fff;" data-ko="다했어요! ⭐"
        data-en="Done! ⭐">다했어요! ⭐</button>
    </div>
  </div>

  <div class="praise-overlay" id="praiseOverlay">
    <div class="praise-card" style="background-color:#ffffff;">
      <div class="praise-emoji" id="praiseEmoji"></div>
      <div class="praise-text" id="praiseText" style="color:#5B4A3F;"></div>
      <div class="praise-sub" id="praiseSub" style="color:#9B8B7E;"></div>
      <div class="praise-tap" id="praiseTap" style="color:#FF8A5C;" data-ko="화면을 터치해서 넘어가요 👉"
        data-en="Tap to continue 👉">화면을 터치해서 넘어가요 👉</div>
    </div>
  </div>

  <script>
    const DATA = [
      { letter: 'ㄱ', word: '기차', emoji: '🚂', color: '#FF6B6B', sound: '칙칙폭폭 기차!' },
      { letter: 'ㄴ', word: '나비', emoji: '🦋', color: '#A78BFA', sound: '팔랑팔랑 나비!' },
      { letter: 'ㄷ', word: '도넛', emoji: '🍩', color: '#F59E0B', sound: '맛있는 도넛!' },
      { letter: 'ㄹ', word: '로봇', emoji: '🤖', color: '#6EE7B7', sound: '삐빅 로봇!' },
      { letter: 'ㅁ', word: '멜론', emoji: '🍈', color: '#34D399', sound: '달콤한 멜론!' },
      { letter: 'ㅂ', word: '별', emoji: '⭐', color: '#FBBF24', sound: '반짝반짝 별!' },
      { letter: 'ㅅ', word: '사자', emoji: '🦁', color: '#FB923C', sound: '어흥! 사자!' },
      { letter: 'ㅇ', word: '오리', emoji: '🦆', color: '#38BDF8', sound: '꽥꽥 오리!' },
      { letter: 'ㅈ', word: '자동차', emoji: '🚗', color: '#F472B6', sound: '부릉부릉 자동차!' },
      { letter: 'ㅊ', word: '치즈', emoji: '🧀', color: '#FCD34D', sound: '냠냠 치즈!' },
      { letter: 'ㅋ', word: '코끼리', emoji: '🐘', color: '#94A3B8', sound: '뿌우 코끼리!' },
      { letter: 'ㅌ', word: '토끼', emoji: '🐰', color: '#FDA4AF', sound: '깡충깡충 토끼!' },
      { letter: 'ㅍ', word: '포도', emoji: '🍇', color: '#C084FC', sound: '새콤달콤 포도!' },
      { letter: 'ㅎ', word: '하마', emoji: '🦛', color: '#67E8F9', sound: '하품하는 하마!' },
    ];

    const PRAISES = [
      { emoji: '🎉', text: '잘했어요!', sub: '정말 멋지게 썼어요!' },
      { emoji: '🌟', text: '최고예요!', sub: '아주 잘 따라 썼어요!' },
      { emoji: '👏', text: '대단해요!', sub: '글씨가 너무 예뻐요!' },
      { emoji: '🏆', text: '훌륭해요!', sub: '천재 아니에요?' },
      { emoji: '💪', text: '멋져요!', sub: '정말 잘했어요!' },
    ];

    const DEV = new URLSearchParams(location.search).has('dev');
    if (DEV) {
      const badge = document.createElement('div');
      badge.textContent = '🛠 DEV MODE';
      badge.style.cssText = 'position:fixed;top:8px;right:8px;background:#FF6B6B;color:#fff;font-family:monospace;font-size:12px;padding:4px 8px;border-radius:8px;z-index:9999;opacity:0.85;';

    // ── 필순 획 데이터 (글자 bounding box 기준 0~1, 좌상=0,0 우하=1,1) ──
    const STROKES = {
      'ㄱ': [[{ x: .05, y: .08 }, { x: .92, y: .08 }, { x: .92, y: .92 }]],
      'ㄴ': [[{ x: .08, y: .05 }, { x: .08, y: .92 }, { x: .92, y: .92 }]],

        [{ x: .05, y: .05 }, { x: .95, y: .05 }],

      ],

      ],
      'ㅁ': [

      ],
      'ㅂ': [
        [{ x: .1, y: .05 }, { x: .1, y: .95 }],
        [{ x: .9, y: .05 }, { x: .9, y: .95 }],
        [{ x: .1, y: .5 }, { x: .9, y: .5 }],
        [{ x: .1, y: .92 }, { x: .9, y: .92 }]
      ],
      'ㅅ': [
        [{ x: .5, y: .05 }, { x: .1, y: .92 }],
        [{ x: .5, y: .05 }, { x: .9, y: .92 }]
      ],
      'ㅇ': [[{ x: .5, y: .05 }, { x: .1, y: .2 }, { x: .02, y: .5 }, { x: .1, y: .8 }, { x: .5, y: .95 }, { x: .9, y: .8 }, { x: .98, y: .5 }, { x: .9, y: .2 }, { x: .5, y: .05 }]],
      'ㅈ': [
        [{ x: .05, y: .28 }, { x: .95, y: .28 }],
        [{ x: .5, y: .28 }, { x: .1, y: .95 }],
        [{ x: .5, y: .28 }, { x: .9, y: .95 }]
      ],
      'ㅊ': [
        [{ x: .5, y: .02 }, { x: .5, y: .2 }],
        [{ x: .05, y: .35 }, { x: .95, y: .35 }],
        [{ x: .5, y: .35 }, { x: .08, y: .95 }],
        [{ x: .5, y: .35 }, { x: .92, y: .95 }]
      ],
      'ㅋ': [
        [{ x: .05, y: .22 }, { x: .95, y: .22 }, { x: .95, y: .90 }],
        [{ x: .05, y: .56 }, { x: .95, y: .56 }]
      ],
      'ㅌ': [
        [{ x: .05, y: .05 }, { x: .95, y: .05 }],
        [{ x: .05, y: .05 }, { x: .05, y: .95 }, { x: .95, y: .95 }],
        [{ x: .05, y: .52 }, { x: .95, y: .52 }]
      ],
      'ㅍ': [
        [{ x: .05, y: .18 }, { x: .95, y: .18 }],
        [{ x: .3, y: .18 }, { x: .3, y: .95 }],
        [{ x: .7, y: .18 }, { x: .7, y: .95 }],
        [{ x: .05, y: .95 }, { x: .95, y: .95 }]
      ],
      'ㅎ': [
        [{ x: .5, y: .02 }, { x: .5, y: .18 }],
        [{ x: .08, y: .30 }, { x: .92, y: .30 }],
        [{ x: .5, y: .32 }, { x: .08, y: .44 }, { x: .02, y: .63 }, { x: .12, y: .82 }, { x: .5, y: .95 }, { x: .88, y: .82 }, { x: .98, y: .63 }, { x: .92, y: .44 }, { x: .5, y: .32 }]
      ]
    };

    // ── 획 경로 그리기 헬퍼 ──
    function drawPath(ctx, pts, color, lineW) {
      if (pts.length < 2) return;
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(pts[0].x, pts[0].y);
      for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
      ctx.strokeStyle = color;
      ctx.lineWidth = lineW;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.stroke();
      ctx.restore();
    }

    // ── 글로우 스타일 획 그리기 ──
    function drawGlowStroke(ctx, pts, color, lw, alpha) {
      if (pts.length < 2) return;
      ctx.save();
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(pts[0].x, pts[0].y);
      for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
      ctx.globalAlpha = alpha * 0.5;
      ctx.strokeStyle = color; ctx.lineWidth = lw * 2.6; ctx.stroke();
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = color; ctx.lineWidth = lw * 0.75; ctx.stroke();
      ctx.globalAlpha = 1;
      ctx.restore();
    }
    // ── Catmull-Rom 스플라인 스무딩 ──
    function catmullRom(pts) {
      if (pts.length < 2) return pts;
      const out = [], n = pts.length, steps = 16;
      for (let i = 0; i < n - 1; i++) {
        const p0 = pts[Math.max(0, i - 1)], p1 = pts[i], p2 = pts[i + 1], p3 = pts[Math.min(n - 1, i + 2)];
        for (let j = 0; j < steps; j++) {
          const t = j / steps, t2 = t * t, t3 = t2 * t;
          out.push({
            x: 0.5 * ((2 * p1.x) + (-p0.x + p2.x) * t + (2 * p0.x - 5 * p1.x + 4 * p2.x - p3.x) * t2 + (-p0.x + 3 * p1.x - 3 * p2.x + p3.x) * t3),
            y: 0.5 * ((2 * p1.y) + (-p0.y + p2.y) * t + (2 * p0.y - 5 * p1.y + 4 * p2.y - p3.y) * t2 + (-p0.y + 3 * p1.y - 3 * p2.y + p3.y) * t3)
          });
        }
      }
      out.push(pts[n - 1]);
      return out;
    }

    // ── 필순 애니메이션 ──
    function animateStrokes(item, w, h, dpr, onDone) {
      const strokes = STROKES[item.letter];
      if (!strokes || DEV) { onDone(); return; }

      animCanvas.style.display = 'block';
      animCanvas.style.opacity = '1';
      animCanvas.width = Math.round(w * dpr);
      animCanvas.height = Math.round(h * dpr);
      animCanvas.style.width = w + 'px';
      animCanvas.style.height = h + 'px';
      const actx = animCanvas.getContext('2d');
      actx.setTransform(dpr, 0, 0, dpr, 0, 0);

      // guideCtx는 setupCanvas에서 이미 Jua 폰트로 그렸으므로 폰트 로드 보장
      const m = guideCtx.measureText(item.letter);
      const hasM = m.actualBoundingBoxLeft > 1 && m.actualBoundingBoxAscent > 1;
      const cL = hasM ? w / 2 - m.actualBoundingBoxLeft : w * 0.15;
      const cT = hasM ? h / 2 - m.actualBoundingBoxAscent : h * 0.15;
      const cW = hasM ? m.actualBoundingBoxLeft + m.actualBoundingBoxRight : w * 0.7;
      const cH = hasM ? m.actualBoundingBoxAscent + m.actualBoundingBoxDescent : h * 0.7;

      // 절대좌표 변환 → Catmull-Rom 스무딩
      const smoothPts = strokes.map(s => catmullRom(s.map(p => ({ x: cL + p.x * cW, y: cT + p.y * cH }))));
      const completedPts = [];
      let strokeIdx = 0;
      let rafId = null, toId = null, done = false;
      const lineW = Math.max(14, Math.min(w, h) * 0.042);
      const dotR = Math.max(11, Math.min(w, h) * 0.04);

      function finish() {
        if (done) return;
        done = true;
        if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
        if (toId) { clearTimeout(toId); toId = null; }
        actx.clearRect(0, 0, w, h);
        animCanvas.style.opacity = '0';
        _animStop = null;
        toId = setTimeout(() => { animCanvas.style.display = 'none'; }, 520);
        onDone();
      }
      _animStop = () => finish();
      animCanvas.addEventListener('pointerdown', () => { if (!done) finish(); }, { once: true });

      function redrawCompleted() {
        for (const cp of completedPts) drawGlowStroke(actx, cp, item.color, lineW, 0.5);
      }

      function runStroke() {
        if (strokeIdx >= smoothPts.length) { finish(); return; }
        const spts = smoothPts[strokeIdx++];
        const startPt = spts[0];
        const segs = [];
        let totalLen = 0;
        for (let i = 1; i < spts.length; i++) {
          const len = Math.hypot(spts[i].x - spts[i - 1].x, spts[i].y - spts[i - 1].y);
          segs.push({ x0: spts[i - 1].x, y0: spts[i - 1].y, x1: spts[i].x, y1: spts[i].y, len });
          totalLen += len;
        }
        const SPEED = Math.min(w, h) * 0.55;
        const duration = Math.max(500, (totalLen / SPEED) * 1000);
        const t0 = performance.now();

        function frame(now) {
          if (done) return;
          const prog = Math.min((now - t0) / duration, 1);
          const targetDist = prog * totalLen;
          let dist = 0, cx = spts[0].x, cy = spts[0].y;
          const partial = [{ x: spts[0].x, y: spts[0].y }];
          for (const seg of segs) {
            if (dist + seg.len >= targetDist) {
              const t = seg.len > 0 ? (targetDist - dist) / seg.len : 0;
              cx = seg.x0 + t * (seg.x1 - seg.x0);
              cy = seg.y0 + t * (seg.y1 - seg.y0);
              partial.push({ x: cx, y: cy });
              break;
            }
            partial.push({ x: seg.x1, y: seg.y1 });
            dist += seg.len; cx = seg.x1; cy = seg.y1;
          }
          actx.clearRect(0, 0, w, h);
          redrawCompleted();
          // 현재 획 글로우로 차오르게
          if (partial.length > 1) drawGlowStroke(actx, partial, item.color, lineW, 0.92);
          // 획 번호 배지 (시작점 고정)
          actx.beginPath();
          actx.arc(startPt.x, startPt.y, dotR, 0, Math.PI * 2);
          actx.fillStyle = item.color;
          actx.fill();
          actx.font = `bold ${Math.max(12, dotR)}px 'Jua', sans-serif`;
          actx.fillStyle = 'white';
          actx.textAlign = 'center';
          actx.textBaseline = 'middle';
          actx.fillText(String(strokeIdx), startPt.x, startPt.y);
          // 이동 글로우 점
          const grad = actx.createRadialGradient(cx, cy, 0, cx, cy, dotR * 2);
          grad.addColorStop(0, 'white');
          grad.addColorStop(0.35, item.color);
          grad.addColorStop(1, item.color + '00');
          actx.beginPath();
          actx.arc(cx, cy, dotR * 2, 0, Math.PI * 2);
          actx.fillStyle = grad;
          actx.fill();
          if (prog < 1) {
            rafId = requestAnimationFrame(frame);
          } else {
            completedPts.push(spts);
            toId = setTimeout(runStroke, 380);
          }
        }
        rafId = requestAnimationFrame(frame);
      }
      runStroke();
    }

    // ── 획순 다시보기 ──
    function replayAnimation() {
      if (_animStop) { _animStop(); _animStop = null; }
      else {
        const actx = animCanvas.getContext('2d');
        const dpr = window.devicePixelRatio || 1;
        actx.clearRect(0, 0, animCanvas.width / dpr, animCanvas.height / dpr);
        animCanvas.style.opacity = '0';
        animCanvas.style.display = 'none';
      }
      const rect = canvasWrap.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      drawCanvas.style.pointerEvents = 'none';
      animateStrokes(currentItem, rect.width, rect.height, dpr, () => {
        drawCanvas.style.pointerEvents = '';
      });
    }

    let currentItem = null;
    let drawAbort = null; // AbortController for draw listeners
    let isDrawing = false;
    let _animStop = null;

    // DOM refs
    const grid = document.getElementById('grid');
    const overlay = document.getElementById('overlay');
    const resEmoji = document.getElementById('resEmoji');
    const resLetter = document.getElementById('resLetter');
    const resWord = document.getElementById('resWord');
    const resSub = document.getElementById('resSub');
    const btnAgain = document.getElementById('btnAgain');
    const btnTrace = document.getElementById('btnTrace');
    const gridScreen = document.getElementById('gridScreen');
    const traceScreen = document.getElementById('traceScreen');
    const traceTitle = document.getElementById('traceTitle');
    const canvasWrap = document.getElementById('canvasWrap');
    const guideCanvas = document.getElementById('guideCanvas');
    const animCanvas = document.getElementById('animCanvas');
    const drawCanvas = document.getElementById('drawCanvas');
    const guideCtx = guideCanvas.getContext('2d');
    const drawCtx = drawCanvas.getContext('2d');
    const praiseOverlay = document.getElementById('praiseOverlay');
    const praiseEmoji = document.getElementById('praiseEmoji');
    const praiseText = document.getElementById('praiseText');
    const praiseSub = document.getElementById('praiseSub');
    const praiseTap = document.getElementById('praiseTap');

    // ── BUILD GRID ──
    DATA.forEach((item, i) => {
      const btn = document.createElement('button');
      btn.className = 'letter-btn';
      const dk = adjustColor(item.color, -20);
      btn.setAttribute('style', `background:linear-gradient(135deg,${item.color},${dk}) !important;color:#ffffff !important;animation-delay:${i * 0.04}s;`);
      btn.textContent = item.letter;
      btn.addEventListener('pointerdown', (e) => { e.preventDefault(); handleTap(item, btn); });
      grid.appendChild(btn);
    });

    // ── TAP ──
    function handleTap(item, btn) {
      currentItem = item;
      for (let i = 0; i < 5; i++) {
        const sp = document.createElement('span');
        sp.className = 'sparkle';
        sp.textContent = ['✨', '⭐', '💫', '🌟', '🎵'][i];
        sp.style.setProperty('--sx', (Math.random() - 0.5) * 80 + 'px');
        sp.style.setProperty('--sy', (-30 - Math.random() * 50) + 'px');
        sp.style.left = (20 + Math.random() * 60) + '%';
        sp.style.top = (20 + Math.random() * 40) + '%';
        btn.appendChild(sp);
        setTimeout(() => sp.remove(), 700);
      }

      if (DEV) {
        showItemInOverlay(item);
        overlay.classList.add('active');
        return;
      }
      playAudio('audio/hangul/combined-' + DATA.indexOf(item) + '.mp3', item.letter + ' ' + item.sound);
      setTimeout(() => { showItemInOverlay(item); overlay.classList.add('active'); }, 400);
    }

    // ── OVERLAY 이전/다음 이동 ──
    function showItemInOverlay(item) {
      currentItem = item;
      resEmoji.textContent = item.emoji;
      resLetter.textContent = item.letter;
      resLetter.style.color = item.color;
      resWord.textContent = item.word;
      resSub.textContent = item.sound;

      playAudio('audio/hangul/combined-' + idx + '.mp3', item.letter + ' ' + item.sound);
    }
    function navigateOverlay(dir) {
      const idx = DATA.indexOf(currentItem);
      showItemInOverlay(DATA[(idx + dir + DATA.length) % DATA.length]);
    }
    document.getElementById('resNavLeft').addEventListener('pointerdown', (e) => { e.preventDefault(); e.stopPropagation(); navigateOverlay(-1); });
    document.getElementById('resNavRight').addEventListener('pointerdown', (e) => { e.preventDefault(); e.stopPropagation(); navigateOverlay(1); });

    // 스와이프 제스처
    let _swipeX = null;
    const _card = document.getElementById('resultCard');
    _card.addEventListener('pointerdown', (e) => { _swipeX = e.clientX; }, { passive: true });
    _card.addEventListener('pointerup', (e) => {
      if (_swipeX === null) return;
      const dx = e.clientX - _swipeX; _swipeX = null;
      if (Math.abs(dx) < 50) return;
      navigateOverlay(dx < 0 ? 1 : -1);
    });

    // ── RESULT BUTTONS ──
    btnAgain.addEventListener('pointerdown', (e) => { e.preventDefault(); stopAllAudio(); overlay.classList.remove('active'); });
    overlay.addEventListener('pointerdown', (e) => { if (e.target === overlay) overlay.classList.remove('active'); });
    btnTrace.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      overlay.classList.remove('active');

    });

    // ── TRACE ──
    function openTrace(item) {
      currentItem = item;
      if (_animStop) { _animStop(); _animStop = null; }
      gridScreen.classList.remove('active');
      traceScreen.classList.add('active');
      traceTitle.innerHTML = `<span style="color:${item.color}">${item.letter}</span> 따라쓰기 ✏️`;
      playAudio('audio/hangul/trace-' + DATA.indexOf(item) + '.mp3', item.letter + ' 따라 써 보세요!');
      setTimeout(() => {
        const rect = canvasWrap.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        setupCanvas(item);
        drawCanvas.style.pointerEvents = 'none';
        animateStrokes(item, rect.width, rect.height, dpr, () => {
          drawCanvas.style.pointerEvents = '';
        });
      }, 80);
    }

    function setupCanvas(item) {
      const rect = canvasWrap.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      const w = rect.width;
      const h = rect.height;

      // Size both canvases
      guideCanvas.width = w * dpr;
      guideCanvas.height = h * dpr;
      guideCanvas.style.width = w + 'px';
      guideCanvas.style.height = h + 'px';

      drawCanvas.width = w * dpr;
      drawCanvas.height = h * dpr;
      drawCanvas.style.width = w + 'px';
      drawCanvas.style.height = h + 'px';

      // Guide
      guideCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
      guideCtx.clearRect(0, 0, w, h);

      // Grid lines
      guideCtx.strokeStyle = '#E8E0D4';
      guideCtx.lineWidth = 1;
      guideCtx.setLineDash([6, 6]);
      guideCtx.beginPath();
      guideCtx.moveTo(w / 2, 0); guideCtx.lineTo(w / 2, h);
      guideCtx.moveTo(0, h / 2); guideCtx.lineTo(w, h / 2);
      guideCtx.stroke();
      guideCtx.setLineDash([]);

      // Border
      guideCtx.strokeStyle = '#D4C8B8';
      guideCtx.lineWidth = 3;
      guideCtx.strokeRect(4, 4, w - 8, h - 8);

      // Guide letter — 소프트 글로우 (점선 → 두꺼운 반투명 solid)
      const fontSize = Math.min(w, h) * 0.7;
      guideCtx.font = `bold ${fontSize}px 'Jua', sans-serif`;
      guideCtx.textAlign = 'center';
      guideCtx.textBaseline = 'middle';
      guideCtx.lineJoin = 'round';
      guideCtx.strokeStyle = item.color + '35';
      guideCtx.lineWidth = Math.max(10, fontSize * 0.06);
      guideCtx.strokeText(item.letter, w / 2, h / 2);
      guideCtx.fillStyle = item.color + '20';
      guideCtx.fillText(item.letter, w / 2, h / 2);

      // Draw canvas setup
      drawCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
      drawCtx.clearRect(0, 0, w, h);

      // Remove old listeners
      if (drawAbort) drawAbort.abort();
      drawAbort = new AbortController();
      const signal = drawAbort.signal;

      const lineW = Math.max(16, w * 0.05);

      function getPos(e) {
        const r = drawCanvas.getBoundingClientRect();
        return { x: e.clientX - r.left, y: e.clientY - r.top };
      }

      drawCanvas.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        isDrawing = true;
        const p = getPos(e);
        drawCtx.beginPath();
        drawCtx.moveTo(p.x, p.y);
        drawCtx.lineCap = 'round';
        drawCtx.lineJoin = 'round';
        drawCtx.lineWidth = lineW;
        drawCtx.strokeStyle = item.color;
      }, { signal });

      drawCanvas.addEventListener('pointermove', (e) => {
        if (!isDrawing) return;
        e.preventDefault();
        const p = getPos(e);
        drawCtx.lineTo(p.x, p.y);
        drawCtx.stroke();
        drawCtx.beginPath();
        drawCtx.moveTo(p.x, p.y);
      }, { signal });

      drawCanvas.addEventListener('pointerup', (e) => { e.preventDefault(); isDrawing = false; }, { signal });
      drawCanvas.addEventListener('pointercancel', () => { isDrawing = false; }, { signal });
      drawCanvas.addEventListener('pointerleave', () => { isDrawing = false; }, { signal });
    }

    // ── TRACE BUTTONS ──
    document.getElementById('traceClearBtn').addEventListener('pointerdown', (e) => {
      e.preventDefault();
      if (_animStop) { _animStop(); _animStop = null; }
      drawCanvas.style.pointerEvents = '';
      const dpr = window.devicePixelRatio || 1;
      drawCtx.clearRect(0, 0, drawCanvas.width / dpr, drawCanvas.height / dpr);
      playAudio('audio/common/again.mp3', '다시 써 보세요!');
    });

    document.getElementById('traceReplayBtn').addEventListener('pointerdown', (e) => {
      e.preventDefault();
      replayAnimation();
    });

    function checkCoverage(item) {
      const rect = canvasWrap.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      const wCanvas = guideCanvas.width;
      const hCanvas = guideCanvas.height;

      const offCanvas = document.createElement('canvas');
      offCanvas.width = wCanvas;
      offCanvas.height = hCanvas;
      const offCtx = offCanvas.getContext('2d');

      offCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const logicalW = wCanvas / dpr;
      const logicalH = hCanvas / dpr;

      const fontSize = Math.min(logicalW, logicalH) * 0.7;
      offCtx.font = `bold ${fontSize}px 'Jua', sans-serif`;
      offCtx.textAlign = 'center';
      offCtx.textBaseline = 'middle';
      offCtx.lineWidth = 3;
      offCtx.fillStyle = '#000';
      offCtx.fillText(item.letter, logicalW / 2, logicalH / 2);
      offCtx.strokeStyle = '#000';
      offCtx.strokeText(item.letter, logicalW / 2, logicalH / 2);

      const maskData = offCtx.getImageData(0, 0, wCanvas, hCanvas).data;
      const drawData = drawCtx.getImageData(0, 0, wCanvas, hCanvas).data;

      let targetPixels = 0;
      let filledPixels = 0;

      for (let i = 0; i < maskData.length; i += 4) {
        if (maskData[i + 3] > 50) {
          targetPixels++;
          if (drawData[i + 3] > 10) {
            filledPixels++;
          }
        }
      }

      if (targetPixels === 0) return 1;
      return filledPixels / targetPixels;
    }

    document.getElementById('traceNextBtn').addEventListener('pointerdown', (e) => {
      e.preventDefault();
      const coverage = checkCoverage(currentItem);
      if (coverage >= 0.3) {
        showPraise(true);
      } else {
        showPraise(false);
      }
    });

    document.getElementById('traceBackBtn').addEventListener('pointerdown', (e) => {
      e.preventDefault();
      if (_animStop) { _animStop(); _animStop = null; }
      stopAllAudio();
      if (drawAbort) drawAbort.abort();
      traceScreen.classList.remove('active');
      gridScreen.classList.add('active');
    });

    // ── PRAISE ──
    let praiseCallback = null;
    praiseOverlay.addEventListener('pointerdown', (e) => {
      if (praiseCallback) {
        const cb = praiseCallback;
        praiseCallback = null;
        cb();
      }
    });

    function showPraise(isSuccess) {
      if (isSuccess) {
        const p = PRAISES[Math.floor(Math.random() * PRAISES.length)];
        praiseEmoji.textContent = p.emoji;
        praiseText.textContent = p.text;
        praiseSub.textContent = p.sub;

        const isEn = document.documentElement.lang === 'en';
        praiseTap.textContent = isEn ? "Tap to continue 👉" : "화면을 터치해서 넘어가요 👉";
        praiseTap.style.display = 'block';

        praiseOverlay.classList.add('active');
        playAudio('audio/hangul/praise-' + PRAISES.indexOf(p) + '.mp3', p.text + ' ' + p.sub);
        spawnConfetti();

        praiseCallback = () => {
          praiseOverlay.classList.remove('active');
          const idx = DATA.indexOf(currentItem);
          const nextIdx = (idx + 1) % DATA.length;
          currentItem = DATA[nextIdx];
          openTrace(currentItem);
        };
      } else {
        praiseEmoji.textContent = '🤔';

        const isEn = document.documentElement.lang === 'en';
        praiseText.textContent = isEn ? "Try again!" : "다시 해보세요!";
        praiseSub.textContent = isEn ? "Color more of the letter!" : "글자를 더 많이 칠해주세요!";
        praiseTap.textContent = isEn ? "Tap to try again 🔄" : "화면을 터치해서 다시하기 🔄";
        praiseTap.style.display = 'block';

        praiseOverlay.classList.add('active');
        playAudio('audio/common/again.mp3', isEn ? "Try again!" : "다시 해보세요!");

        praiseCallback = () => {
          praiseOverlay.classList.remove('active');
          const dpr = window.devicePixelRatio || 1;
          drawCtx.clearRect(0, 0, drawCanvas.width / dpr, drawCanvas.height / dpr);
        };
      }
    }

    function spawnConfetti() {
      const emojis = ['🎉', '⭐', '🌈', '💫', '🎊', '🌟', '✨', '🎵', '❤️', '🦋'];
      for (let i = 0; i < 20; i++) {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        c.style.left = Math.random() * 100 + 'vw';
        c.style.animationDelay = Math.random() * 0.8 + 's';
        c.style.animationDuration = (1.5 + Math.random() * 1.5) + 's';
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 3500);
      }
    }

    // ── TTS ──
    function speak(text) {
      if (!('speechSynthesis' in window)) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'ko-KR'; u.rate = 0.85; u.pitch = 1.3;
      const v = window.speechSynthesis.getVoices().find(v => v.lang.startsWith('ko'));
      if (v) u.voice = v;
      window.speechSynthesis.speak(u);
    }
    let _curAudio = null;
    function stopAllAudio() {
      if (_curAudio) { _curAudio.pause(); _curAudio = null; }
      window.speechSynthesis && window.speechSynthesis.cancel();
    }
    function playAudio(src, fallback) {
      stopAllAudio();
      const a = new Audio(src);
      _curAudio = a;
      a.onerror = () => speak(fallback);
      a.play().catch(() => speak(fallback));
    }
    if ('speechSynthesis' in window) { speechSynthesis.getVoices(); speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices(); }

    function adjustColor(hex, amt) {
      hex = hex.replace('#', '');
      const r = Math.max(0, Math.min(255, parseInt(hex.substr(0, 2), 16) + amt));
      const g = Math.max(0, Math.min(255, parseInt(hex.substr(2, 2), 16) + amt));
      const b = Math.max(0, Math.min(255, parseInt(hex.substr(4, 2), 16) + amt));
      return '#' + r.toString(16).padStart(2, '0') + g.toString(16).padStart(2, '0') + b.toString(16).padStart(2, '0');
    }
    // ===== GK LANG + PWA =====
    (function () { function gkSet(lang) { localStorage.setItem('gk-lang', lang); document.documentElement.lang = lang; document.querySelectorAll('[data-ko]').forEach(function (el) { el.textContent = lang === 'en' ? el.dataset.en : el.dataset.ko; }); var b = document.getElementById('gkLangBtn'); if (b) b.textContent = lang === 'en' ? '🇰🇷 KO' : '🇺🇸 EN'; } window.gkToggleLang = function () { gkSet((localStorage.getItem('gk-lang') || 'ko') === 'ko' ? 'en' : 'ko'); }; gkSet(localStorage.getItem('gk-lang') || 'ko'); })();
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/service-worker.js'); }
  </script>
</body>
