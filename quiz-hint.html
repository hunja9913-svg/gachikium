<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="color-scheme" content="light only">
  <title>가치키움 🌱 - 힌트 퀴즈</title>
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light only !important;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Jua', sans-serif;
      touch-action: none;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 15% 15%, rgba(255, 235, 200, 0.4) 0%, transparent 40%),
        radial-gradient(circle at 85% 85%, rgba(200, 240, 220, 0.4) 0%, transparent 40%),
        radial-gradient(circle at 50% 50%, rgba(255, 220, 220, 0.3) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .screen {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 10;
    }

    .screen.active {
      display: flex;
    }

    /* === START SCREEN === */
    .start-card {
      padding: 40px;
      border-radius: 32px;
      box-shadow: 0 12px 0 rgba(0, 0, 0, 0.08), 0 4px 24px rgba(0, 0, 0, 0.06);
      text-align: center;
      max-width: 400px;
      width: 90%;
      animation: dropIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .start-emoji {
      font-size: clamp(60px, 15vw, 80px);
      line-height: 1;
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.1));
      animation: bounce 2s ease-in-out infinite alternate;
    }

    .start-title {
      font-size: clamp(28px, 7vw, 36px);
      line-height: 1.2;
    }

    .start-desc {
      font-size: clamp(16px, 4vw, 20px);
      line-height: 1.4;
      opacity: 0.8;
      word-break: keep-all;
    }

    /* === GAME SCREEN === */
    .top-bar {
      position: absolute;
      top: env(safe-area-inset-top, 20px);
      left: 20px;
      right: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 20;
    }

    /* === UI CATEGORY GRID === */
    .category-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 10px 0;
      width: 100%;
    }

    .cat-btn {
      background: #ffffff;
      border: 3px solid #E8E0D4;
      border-radius: 16px;
      padding: 14px 10px;
      font-family: inherit;
      font-size: clamp(16px, 4vw, 20px);
      color: #A09080;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 0 rgba(0, 0, 0, 0.05);
      opacity: 0.6;
      filter: grayscale(1);
    }

    .cat-btn.active {
      background: #FFF9E6;
      border-color: #FFCA28;
      color: #5B4040;
      opacity: 1;
      filter: grayscale(0);
      box-shadow: 0 6px 0 rgba(255, 202, 40, 0.3);
      transform: translateY(-2px);
    }

    .cat-btn:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 rgba(0, 0, 0, 0.05);
    }

    .cat-btn.active:active {
      box-shadow: 0 2px 0 rgba(255, 202, 40, 0.3);
    }

    .cat-all-btn {
      background: #F4F1ED;
      border: 2px solid #E8E0D4;
      border-radius: 20px;
      padding: 8px 16px;
      font-family: inherit;
      font-size: clamp(14px, 3vw, 16px);
      color: #A09080;
      cursor: pointer;
      width: 100%;
      margin-bottom: 5px;
      transition: all 0.2s;
      opacity: 0.6;
    }

    .cat-all-btn.active {
      background: #E8FFF8;
      border-color: #4ECDC4;
      color: #3B9B94;
      opacity: 1;
    }

    /* === SNOW SPARKLE on correct answer === */
    @keyframes snowFall {
      0% {
        transform: translateY(-20px) translateX(0) rotate(0deg);
        opacity: 1;
      }

      100% {
        transform: translateY(110vh) translateX(var(--drift)) rotate(720deg);
        opacity: 0;
      }
    }

    .snow-sparkle {
      position: fixed;
      top: -30px;
      font-size: 22px;
      z-index: 400;
      pointer-events: none;
      animation: snowFall var(--duration) ease-in forwards;
    }

    /* === SCENE: QUIZ === */

    .top-bar-space {
      width: 100%;
      height: 60px;
      flex-shrink: 0;
    }

    .progress-container {
      width: 120px;
      height: 12px;
      background: rgba(0, 0, 0, 0.05);
      border-radius: 6px;
      overflow: hidden;
      margin-left: auto;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #FFB070, #FFD080);
      width: 0%;
      transition: width 0.4s ease;
      border-radius: 6px;
    }

    .quiz-progress {
      font-size: 18px;
      color: #908070;
      margin-top: 4px;
      text-align: right;
    }

    .hint-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 600px;
      padding: 10px;
      margin-top: 20px;
      margin-bottom: 40px;
    }

    .hint-box {
      width: 100%;
      min-height: 160px;
      padding: 30px 20px;
      border-radius: 28px;
      background: #ffffff;
      box-shadow: 0 8px 0 rgba(0, 0, 0, 0.06), 0 4px 16px rgba(0, 0, 0, 0.04);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      position: relative;
    }

    .hint-text {
      font-size: clamp(22px, 5.5vw, 32px);
      line-height: 1.4;
      color: #5B4040;
      word-break: keep-all;
    }

    .hint-replay {
      position: absolute;
      bottom: -15px;
      background: #FFE082;
      border: 3px solid #FFCA28;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 4px 0 rgba(200, 150, 0, 0.2);
      cursor: pointer;
      z-index: 5;
    }

    .hint-replay:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 rgba(200, 150, 0, 0.2);
    }

    .choices {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: row;
      justify-content: center;
      gap: 12px;
      padding-bottom: env(safe-area-inset-bottom, 20px);
      animation: dropIn 0.6s 0.2s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .choice-btn {
      flex: 1;
      background: #ffffff;
      border: 3px solid #F0E0D8;
      border-radius: 24px;
      padding: 20px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      box-shadow: 0 6px 0 rgba(0, 0, 0, 0.08);
      cursor: pointer;
      font-family: inherit;
      transition: all 0.1s;
      min-height: 140px;
      justify-content: center;
    }

    .choice-btn:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 rgba(0, 0, 0, 0.08);
    }

    .choice-btn span:first-child {
      font-size: clamp(40px, 10vw, 56px);
      line-height: 1;
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1));
    }

    .choice-name {
      font-size: clamp(16px, 4vw, 20px);
      color: #807060;
    }

    .choice-btn.correct {
      background: #E8FFF8 !important;
      border-color: #4ECDC4 !important;
      animation: correctPop 0.5s ease;
    }

    .choice-btn.wrong {
      background: #FFF0F0 !important;
      border-color: #FF6B6B !important;
      animation: wrongShake 0.4s ease;
      opacity: 0.5;
    }

    /* === RESULT SCREEN === */
    .result-card {
      background: #ffffff;
      padding: 40px;
      border-radius: 32px;
      box-shadow: 0 12px 0 rgba(0, 0, 0, 0.08), 0 4px 24px rgba(0, 0, 0, 0.06);
      text-align: center;
      max-width: 400px;
      width: 90%;
      display: flex;
      flex-direction: column;
      gap: 20px;
      animation: dropIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      z-index: 100;
    }

    .result-emoji {
      font-size: clamp(70px, 18vw, 90px);
      line-height: 1;
      animation: popIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .result-title {
      font-size: clamp(32px, 8vw, 40px);
      color: #FF8A65;
      line-height: 1.2;
    }

    .result-score {
      font-size: clamp(24px, 6vw, 28px);
      background: #FFF5E6;
      padding: 12px 24px;
      border-radius: 50px;
      display: inline-block;
      margin: 0 auto;
      color: #D84315;
    }

    .result-sub {
      font-size: 18px;
      color: #8D6E63;
    }

    /* === BUTTONS === */
    .btn {
      background: linear-gradient(135deg, #FFB070, #FF8A65);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 16px 32px;
      font-size: clamp(20px, 5vw, 24px);
      font-family: inherit;
      box-shadow: 0 6px 0 rgba(200, 80, 50, 0.3), 0 4px 12px rgba(255, 138, 101, 0.3);
      cursor: pointer;
      transition: all 0.1s;
    }

    .btn:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 rgba(200, 80, 50, 0.3);
    }

    .btn-outline {
      background: #fff;
      color: #B08070;
      border: 2px solid #E8D0C0;
      box-shadow: 0 3px 0 rgba(0, 0, 0, 0.07);
      font-size: clamp(15px, 3.8vw, 18px);
      padding: 12px 28px;
    }

    .btn-outline:active {
      transform: translateY(3px);
      box-shadow: 0 0px 0 rgba(0, 0, 0, 0.07);
    }

    .result-btns {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      align-items: center;
    }

    /* === FEEDBACK OVERLAY === */
    .feedback-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 300;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .feedback-overlay.active {
      opacity: 1;
    }

    .feedback-inner {
      font-size: clamp(100px, 30vw, 150px);
      filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.2));
    }

    .feedback-overlay.active .feedback-inner {
      animation: feedbackPop 0.8s ease-out both;
    }

    .deco {
      position: fixed;
      pointer-events: none;
      opacity: 0.12;
      font-size: clamp(30px, 8vw, 50px);
      z-index: 0;
    }

    .deco-1 {
      top: 5%;
      left: 5%;
      animation: floatA 6s ease-in-out infinite;
    }

    .deco-2 {
      top: 8%;
      right: 8%;
      animation: floatB 7s ease-in-out infinite;
    }

    .deco-3 {
      bottom: 6%;
      left: 10%;
      animation: floatA 8s ease-in-out infinite;
    }

    .deco-4 {
      bottom: 10%;
      right: 6%;
      animation: floatB 5s ease-in-out infinite;
    }

    @keyframes dropIn {
      from {
        opacity: 0;
        transform: translateY(-30px) scale(0.9)
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1)
      }
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.5)
      }

      to {
        opacity: 1;
        transform: scale(1)
      }
    }

    @keyframes bounce {
      from {
        transform: translateY(0)
      }

      to {
        transform: translateY(-10px)
      }
    }

    @keyframes floatA {

      0%,
      100% {
        transform: translateY(0) rotate(0deg)
      }

      50% {
        transform: translateY(-15px) rotate(8deg)
      }
    }

    @keyframes floatB {

      0%,
      100% {
        transform: translateY(0) rotate(0deg)
      }

      50% {
        transform: translateY(10px) rotate(-6deg)
      }
    }

    @keyframes correctPop {
      0% {
        transform: scale(1)
      }

      50% {
        transform: scale(1.15)
      }

      100% {
        transform: scale(1.05)
      }
    }

    @keyframes wrongShake {
      0% {
        transform: translateX(0)
      }

      25% {
        transform: translateX(-8px)
      }

      50% {
        transform: translateX(8px)
      }

      75% {
        transform: translateX(-4px)
      }

      100% {
        transform: translateX(0)
      }
    }

    @keyframes feedbackPop {
      0% {
        opacity: 0;
        transform: scale(0.3)
      }

      40% {
        opacity: 1;
        transform: scale(1.2)
      }

      100% {
        opacity: 0;
        transform: scale(1.5) translateY(-30px)
      }
    }

    @keyframes confettiFall {
      0% {
        transform: translateY(-10px) rotate(0deg);
        opacity: 1
      }

      100% {
        transform: translateY(100vh) rotate(720deg);
        opacity: 0
      }
    }

    .confetti {
      position: fixed;
      top: -20px;
      font-size: 24px;
      z-index: 350;
      pointer-events: none;
      animation: confettiFall 2.5s ease-in forwards;
    }

    /* === NAV: 홈 버튼 + 언어 토글 === */
    .gk-nav {
      position: fixed;
      top: 12px;
      left: 12px;
      display: flex;
      gap: 8px;
      z-index: 9999;
    }

    .gk-nav-btn {
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 2px solid rgba(0, 0, 0, 0.08);
      border-radius: 50px;
      padding: 8px 14px;
      font-family: 'Jua', sans-serif;
      font-size: clamp(13px, 3vw, 15px);
      color: #5B4040;
      cursor: pointer;
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.12);
      -webkit-tap-highlight-color: transparent;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .gk-nav-btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.12);
    }
  </style>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  <meta name="theme-color" content="#FFF5EE">
</head>

<body style="background-color:#FFF5EE !important;color:#5B4040 !important;">

  <div class="screen active" id="startScreen">

      <div class="start-emoji">💡</div>
      <div class="start-title" style="color:#5B4040;" data-ko="힌트 퀴즈" data-en="Hint Quiz">힌트 퀴즈</div>
      <div class="start-desc" style="color:#807060;" data-ko="퀴즈 주제를 골라주세요!" data-en="Choose your quiz topics!">퀴즈 주제를

        <button class="cat-btn active" data-cat="vehicles">🚒 씽씽 탈것</button>

      <button class="btn" id="startBtn" style="margin-top: 15px;" data-ko="시작하기 🚀" data-en="Start 🚀">시작하기 🚀</button>

  <div class="screen" id="quizScreen">
    <div class="top-bar-space"></div>

      <div>

    <div class="hint-container">
      <div class="hint-box">

        <div class="hint-replay" id="hintReplay" style="visibility:hidden;">🔊</div>
      </div>

  </div>

  <div class="screen" id="resultScreen">
    <div class="result-card">
      <div class="result-emoji" id="resultEmoji">🏆</div>
      <div class="result-title" id="resultTitle">완벽해요!</div>
      <div class="result-score" id="resultScore">10 / 10 맞았어요!</div>

      <div class="result-btns">

        <button class="btn btn-outline" id="resultBtn" data-ko="처음으로 🔄" data-en="Menu 🔄">처음으로 🔄</button>
      </div>
    </div>
  </div>

  <div class="feedback-overlay" id="feedback">
    <div class="feedback-inner" id="feedbackInner">⭕</div>
  </div>

      { id: 'puzzle', cat: 'town', name: '퍼즐', en: 'Puzzle', emoji: '🧩', hint: '조각들을 딱 맞춰요! 다 맞추면 그림이 완성돼요!' },
      { id: 'camera', cat: 'town', name: '카메라', en: 'Camera', emoji: '📸', hint: '찰칵! 사진을 찍어요! 소중한 추억을 남겨줘요!' },
      { id: 'telescope', cat: 'town', name: '망원경', en: 'Telescope', emoji: '🔭', hint: '멀리 있는 걸 크게 보여줘요! 별을 볼 때 써요!' },
      { id: 'tree', cat: 'town', name: '나무', en: 'Tree', emoji: '🌳', hint: '뿌리, 줄기, 잎이 있어요! 그늘을 만들어줘요. 새가 살아요!' },
      { id: 'mountain', cat: 'town', name: '산', en: 'Mountain', emoji: '🏔️', hint: '아주 높아요! 꼭대기에 올라가면 바람이 세게 불어요!' },
      { id: 'wave', cat: 'town', name: '파도', en: 'Wave', emoji: '🌊', hint: '바닷가에서 넘실넘실해요! 쏴아~ 소리가 나요!' },
      { id: 'tent', cat: 'town', name: '텐트', en: 'Tent', emoji: '⛺', hint: '캠핑할 때 세워요! 삼각형 모양이에요. 안에서 잠을 자요!' },
      { id: 'castle', cat: 'town', name: '성', en: 'Castle', emoji: '🏰', hint: '높은 탑이 있어요! 왕과 공주가 살아요!' },
      { id: 'ferriswheel', cat: 'town', name: '관람차', en: 'Ferris Wheel', emoji: '🎡', hint: '크고 둥근 바퀴예요! 천천히 돌아가요. 높이 올라가면 멀리 보여요!' },
      { id: 'fountain', cat: 'town', name: '분수', en: 'Fountain', emoji: '⛲', hint: '공원에 있어요! 물이 하늘로 솟구쳐 올라와요!' },
      { id: 'carousel', cat: 'town', name: '회전목마', en: 'Carousel', emoji: '🎠', hint: '말이 빙글빙글 돌아가요! 음악과 함께 신나게 돌아요!' },
      { id: 'circus', cat: 'town', name: '서커스', en: 'Circus', emoji: '🎪', hint: '멋진 묘기를 보여줘요! 원형 텐트 안에서 신나게 해요!' },
      { id: 'bridge', cat: 'town', name: '다리', en: 'Bridge', emoji: '🌉', hint: '강이나 바다 위를 건너가요! 차와 사람이 다녀요!' },
      { id: 'flashlight', cat: 'town', name: '손전등', en: 'Flashlight', emoji: '🔦', hint: '손으로 쥐고 빛을 내요! 어두운 곳에서 켜요!' },
      { id: 'magnet', cat: 'town', name: '자석', en: 'Magnet', emoji: '🧲', hint: '쇠붙이를 당기는 힘이 있어요! 빨간쪽과 파란쪽이 있어요!' },
    ];

    const TOTAL_QUESTIONS = 10;
    const OPTION_COUNT = 3;
    const DEV = new URLSearchParams(location.search).has('dev');
    if (DEV) {
      const badge = document.createElement('div');
      badge.textContent = '🛠 DEV MODE';
      badge.style.cssText = 'position:fixed;top:8px;right:8px;background:#FF6B6B;color:#fff;font-family:monospace;font-size:12px;padding:4px 8px;border-radius:8px;z-index:9999;opacity:0.85;';
      document.body.appendChild(badge);
    }

    let score = 0;
    let currentQ = 0;
    let quizData = [];
    let _curAudio = null;
    let answered = false;
    let currentHintIdx = 0;
    let currentHint = '';

    // History array to prevent asking the same question again unless all have been asked
    let history = JSON.parse(localStorage.getItem('gk-quiz-history')) || [];

    const startScreen = document.getElementById('startScreen');
    const quizScreen = document.getElementById('quizScreen');
    const resultScreen = document.getElementById('resultScreen');

    const progressBar = document.getElementById('progressBar');
    const quizProgress = document.getElementById('quizProgress');
    const hintText = document.getElementById('hintText');
    const hintReplay = document.getElementById('hintReplay');
    const choicesEl = document.getElementById('choices');
    const feedback = document.getElementById('feedback');
    const feedbackInner = document.getElementById('feedbackInner');
    const startBtn = document.getElementById('startBtn');

    // Category Selection Logic
    const catBtns = document.querySelectorAll('.cat-btn');
    const catAllBtn = document.getElementById('catAllBtn');

    // Display counts
    const catCounts = {};
    ALL_ITEMS.forEach(it => {
      catCounts[it.cat] = (catCounts[it.cat] || 0) + 1;
    });

    catBtns.forEach(btn => {
      const cat = btn.dataset.cat;
      const count = catCounts[cat] || 0;
      const originalText = btn.textContent;
      btn.innerHTML = `<div style="margin-bottom: 2px;">${originalText}</div><div style="font-size: 0.75em; opacity: 0.7;">(${count}문제)</div>`;

      btn.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        btn.classList.toggle('active');
        updateStartBtn();
      });
    });

    function updateStartBtn() {
      const anyActive = Array.from(catBtns).some(b => b.classList.contains('active'));
      const allActive = Array.from(catBtns).every(b => b.classList.contains('active'));
      startBtn.style.opacity = anyActive ? '1' : '0.5';
      startBtn.style.pointerEvents = anyActive ? 'auto' : 'none';

      if (allActive) {
        catAllBtn.classList.add('active');
        catAllBtn.innerHTML = `✅ 모두 섞어서 <span style="font-size: 0.85em; opacity: 0.8;">(총 ${ALL_ITEMS.length}문제)</span>`;
      } else {
        catAllBtn.classList.remove('active');
        catAllBtn.innerHTML = `모두 섞어서 <span style="font-size: 0.8em; opacity: 0.6;">(전체선택)</span>`;
      }
    }

    // Initial call to set the "모두 섞어서" text properly on load
    updateStartBtn();

    catAllBtn.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      const isAllActive = catAllBtn.classList.contains('active');
      catBtns.forEach(b => {
        if (isAllActive) b.classList.remove('active');
        else b.classList.add('active');
      });
      updateStartBtn();
    });

    startBtn.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      startGame();
    });

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function getSelectedCategories() {
      return Array.from(catBtns)
        .filter(b => b.classList.contains('active'))
        .map(b => b.dataset.cat);
    }

    function startGame() {
      score = 0;
      currentQ = 0;

      const selectedCats = getSelectedCategories();
      quizData = generateQuizData(selectedCats);

      if (quizData.length === 0) return;

      startScreen.classList.remove('active');
      resultScreen.classList.remove('active');
      quizScreen.classList.add('active');
      gkUpdateText();

      showQuestion();
    }

    function generateQuizData(selectedCats) {
      // 1. Filter ALL_ITEMS by selected categories
      let pool = ALL_ITEMS.filter(item => selectedCats.includes(item.cat));

      // 2. Filter out already asked questions from history
      let availablePool = pool.filter(item => !history.includes(item.id));

      // 3. If there are not enough available questions, reset the history for these categories
      if (availablePool.length < TOTAL_QUESTIONS) {
        console.log("Not enough new questions. Resetting history for selected categories.");
        const selectedIds = pool.map(i => i.id);
        history = history.filter(id => !selectedIds.includes(id));
        availablePool = pool; // use all questions from these categories again
      }

      const shuffled = shuffle(availablePool);
      const data = [];
      const questionsToAsk = Math.min(TOTAL_QUESTIONS, shuffled.length); // usually 10, unless pool is incredibly small

      for (let i = 0; i < questionsToAsk; i++) {
        const target = shuffled[i];

        // Options can come from anywhere, but let's prefer the same category pool for options to make it harder, 
        // falling back to ALL_ITEMS if needed.
        let optionPool = pool.length >= OPTION_COUNT ? pool : ALL_ITEMS;
        let others = shuffle(optionPool).filter(x => x.id !== target.id);
        others = others.slice(0, OPTION_COUNT - 1);

        const options = shuffle([target, ...others]);
        data.push({ correct: target, options });

        // Add to history and save
        history.push(target.id);
      }

      localStorage.setItem('gk-quiz-history', JSON.stringify(history));
      return data;
    }

    function showQuestion() {
      answered = false;
      const q = quizData[currentQ];

      quizProgress.textContent = `${currentQ + 1} / ${quizData.length}`;
      progressBar.style.width = ((currentQ) / quizData.length * 100) + '%';

      // Initially hide choices and replay button
      choicesEl.style.visibility = 'hidden';
      choicesEl.style.display = '';
      hintReplay.style.visibility = 'hidden';
      hintReplay.style.display = '';

      // Hint
      currentHint = q.correct.hint;
      currentHintIdx = ALL_ITEMS.indexOf(q.correct);
      hintText.textContent = currentHint;
      if (DEV) {
        // DEV: 오디오 스킵, 선택지 즉시 표시
        choicesEl.style.visibility = 'visible';
        hintReplay.style.visibility = 'visible';
      } else {
        playAudio('audio/hint/hint-' + currentHintIdx + '.mp3', currentHint, () => {
          choicesEl.style.visibility = 'visible';
          hintReplay.style.visibility = 'visible';
          choicesEl.style.animation = 'none';
          requestAnimationFrame(() => { choicesEl.style.animation = ''; });
        });
      }

      // Choices
      choicesEl.innerHTML = '';
      q.options.forEach((opt) => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.setAttribute('style', 'background-color:#ffffff !important;border-color:#F0E0D8 !important;');
        btn.innerHTML = `<span style="pointer-events:none;">${opt.emoji}</span><span class="choice-name" style="color:#B0A090;">${opt.name}</span>`;
        btn.addEventListener('pointerdown', (e) => {
          e.preventDefault();
          if (answered) return;
          handleAnswer(btn, opt, q.correct);
        });
        choicesEl.appendChild(btn);
      });

      // Re-trigger animation for hint box
      const hintBox = document.querySelector('.hint-box');
      hintBox.style.animation = 'none';
      requestAnimationFrame(() => { hintBox.style.animation = ''; });
    }

    // Replay hint
    hintReplay.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      if (answered) return;
      playAudio('audio/hint/hint-' + currentHintIdx + '.mp3', currentHint);
    });

    function handleAnswer(btn, selected, correct) {
      answered = true;
      stopAllAudio();

      let advanced = false;
      function advance() {
        if (advanced) return;
        advanced = true;
        stopAllAudio();
        currentQ++;
        if (currentQ < quizData.length) showQuestion();
        else showResult();
      }

      if (selected.name === correct.name) {
        btn.classList.add('correct');
        btn.setAttribute('style', 'background-color:#E8FFF8 !important;border-color:#4ECDC4 !important;');
        score++;
        showFeedback('⭕');
        spawnSnowSparkles();
        playAudio('audio/hint/correct-' + currentHintIdx + '.mp3', '맞았어요! ' + correct.name + '! 정말 잘했어요!', advance);
      } else {
        btn.classList.add('wrong');
        btn.setAttribute('style', 'background-color:#FFF0F0 !important;border-color:#FF6B6B !important;opacity:0.5;');
        const allBtns = choicesEl.querySelectorAll('.choice-btn');
        allBtns.forEach(b => {
          if (b.querySelector('span').textContent === correct.emoji) {
            b.classList.add('correct');
            b.setAttribute('style', 'background-color:#E8FFF8 !important;border-color:#4ECDC4 !important;');
          }
        });
        showFeedback('❌');
        playAudio('audio/hint/wrong-' + currentHintIdx + '.mp3', '아쉬워요! 정답은 ' + correct.name + '이에요!', advance);
      }

      setTimeout(advance, DEV ? 1500 : 10000); // DEV: 1.5초, 일반: 10초 안전 타임아웃
    }

    function showFeedback(emoji) {
      feedbackInner.textContent = emoji;
      feedback.classList.remove('active');
      void feedback.offsetWidth;
      feedback.classList.add('active');
      feedbackInner.style.animation = 'none';
      requestAnimationFrame(() => { feedbackInner.style.animation = ''; });
      setTimeout(() => feedback.classList.remove('active'), 900);
    }

    function spawnSnowSparkles() {
      const emojis = ['✨', '⭐', '❄️', '🌟', '💫', '🌈', '🦄', '🎉', '💖', '♥️'];
      const count = 28;
      for (let i = 0; i < count; i++) {
        setTimeout(() => {
          const el = document.createElement('div');
          el.className = 'snow-sparkle';
          el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
          const duration = (1.5 + Math.random() * 1.5).toFixed(2) + 's';
          const drift = ((Math.random() - 0.5) * 120).toFixed(0) + 'px';
          el.style.setProperty('--duration', duration);
          el.style.setProperty('--drift', drift);
          el.style.left = (Math.random() * 100) + 'vw';
          el.style.fontSize = (16 + Math.random() * 14) + 'px';
          document.body.appendChild(el);
          setTimeout(() => el.remove(), parseFloat(duration) * 1000 + 100);
        }, i * 60);
      }
    }

    function showResult() {
      quizScreen.classList.remove('active');
      resultScreen.classList.add('active');
      progressBar.style.width = '100%';

      const pct = score / TOTAL_QUESTIONS;
      let emoji, title, sub;
      let resultIdx;
      if (pct >= 0.9) { emoji = '🏆'; title = '완벽해요!'; sub = '힌트 박사님이네요!'; resultIdx = 0; }
      else if (pct >= 0.7) { emoji = '🌟'; title = '잘했어요!'; sub = '거의 다 맞았어요!'; resultIdx = 1; }
      else if (pct >= 0.5) { emoji = '👏'; title = '좋아요!'; sub = '조금만 더 연습해요!'; resultIdx = 2; }
      else { emoji = '💪'; title = '괜찮아요!'; sub = '다시 한번 도전해요!'; resultIdx = 3; }

      document.getElementById('resultEmoji').textContent = emoji;
      document.getElementById('resultTitle').textContent = title;
      document.getElementById('resultScore').textContent = `${score} / ${quizData.length} 맞았어요!`;
      document.getElementById('resultSub').textContent = sub;

      playAudio('audio/hint/result-' + resultIdx + '.mp3', title + ' ' + sub);
      if (pct >= 0.7) spawnConfetti();

      // 계속하기 버튼: 남은 문제 수 계산
      const selectedCats = getSelectedCategories();
      const pool = ALL_ITEMS.filter(it => selectedCats.includes(it.cat));
      const remaining = pool.filter(it => !history.includes(it.id)).length;
      const contBtn = document.getElementById('continueBtn');
      if (remaining > 0) {
        contBtn.textContent = `계속하기 ▶ (남은 ${remaining}개)`;
        contBtn.style.opacity = '1';
        contBtn.style.pointerEvents = 'auto';
      } else {
        contBtn.textContent = '계속하기 (문제 소진! 처음부터)';
        contBtn.style.opacity = '1';
        contBtn.style.pointerEvents = 'auto';
      }
    }

    document.getElementById('resultBtn').addEventListener('pointerdown', (e) => {
      e.preventDefault();
      quizScreen.classList.remove('active');
      resultScreen.classList.remove('active');
      startScreen.classList.add('active');
    });

    document.getElementById('continueBtn').addEventListener('pointerdown', (e) => {
      e.preventDefault();
      resultScreen.classList.remove('active');
      startGame(); // 같은 카테고리 선택 유지한 채 이어서 플레이
    });

    function spawnConfetti() {
      const emojis = ['🎉', '⭐', '🌈', '💫', '🎊', '🌟', '✨', '🎵', '❤️', '🎈'];
      for (let i = 0; i < 20; i++) {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        c.style.left = Math.random() * 100 + 'vw';
        c.style.animationDelay = Math.random() * 0.8 + 's';
        c.style.animationDuration = (1.5 + Math.random() * 1.5) + 's';
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 3500);
      }
    }

    // TTS & Audio
    function speak(text, cb) {
      if (!window.speechSynthesis) { if (cb) cb(); return; }
      const u = new SpeechSynthesisUtterance(text);
      if (document.documentElement.lang === 'en') {
        u.lang = 'en-US';
      } else {
        u.lang = 'ko-KR';
      }
      u.rate = 1.0;
      u.pitch = 1.1;
      u.volume = 1.0;

      if (cb) u.onend = cb;
      window.speechSynthesis.speak(u);
    }

    function stopAllAudio() {
      if (_curAudio) { _curAudio.pause(); _curAudio = null; }
      window.speechSynthesis && window.speechSynthesis.cancel();
    }

    function playAudio(src, fallback, onEnd) {
      stopAllAudio();
      const a = new Audio(src);
      _curAudio = a;

      const endCb = () => { if (onEnd) onEnd(); };
      a.onended = endCb;
      a.onerror = () => speak(fallback, endCb);

      a.play().catch(() => speak(fallback, endCb));
    }
    if ('speechSynthesis' in window) { speechSynthesis.getVoices(); speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices(); }
    // ===== GK LANG + PWA =====
    function gkUpdateText() {
      const isEn = document.documentElement.lang === 'en';
      document.querySelectorAll('[data-ko]').forEach(el => {
        el.textContent = isEn ? el.dataset.en : el.dataset.ko;
      });
    }
    function gkToggleLang() {
      const cur = document.documentElement.lang || 'ko';
      const nxt = cur === 'ko' ? 'en' : 'ko';
      document.documentElement.lang = nxt;
      localStorage.setItem('gk-lang', nxt);
      document.getElementById('gkLangBtn').textContent = nxt === 'en' ? '🇰🇷 KO' : '🇺🇸 EN';
      gkUpdateText();
    }
    (function gkInit() {
      const saved = localStorage.getItem('gk-lang') || 'ko';
      document.documentElement.lang = saved;
      const btn = document.getElementById('gkLangBtn');
      if (btn) btn.textContent = saved === 'en' ? '🇰🇷 KO' : '🇺🇸 EN';
      gkUpdateText();
    })();
  </script>
